name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-24.04
    # Container pins the compiler + glibc so goldens match the local
    # dev toolchain (gcc 15.x). Without this, CI sat on Ubuntu 24.04's
    # gcc-14 and every commit's tests failed on layout/sig drift.
    container: gcc:15
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          apt-get update
          apt-get install -y cmake ninja-build python3

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  # clang + libc++ on Linux. The point is catching libc++-specific
  # header drift (transitive include leaks, missing <format>/<print>
  # explicit pulls) without waiting on the macos-14 runner, which is
  # both slower to schedule and only covers Apple Clang. CLI is out of
  # scope for the same libc++ <print> reason as build-macos.
  build-clang-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build python3 \
                                  clang-18 libc++-18-dev libc++abi-18-dev

      - name: Configure
        env:
          CC: clang-18
          CXX: clang++-18
          CXXFLAGS: -stdlib=libc++
          LDFLAGS: -stdlib=libc++
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DEMBER_BUILD_CLI=OFF

      - name: Build core + unit-test executables
        run: |
          cmake --build build --target ember_core \
                                       ember_demangle_test \
                                       ember_annotations_resolver_test \
                                       ember_sigs_test

      - name: Run toolchain-independent unit tests
        run: |
          ctest --test-dir build --output-on-failure \
            -R '^(demangle_unit|annotations_resolver_unit|sigs_unit)$'

  # Apple Clang build of `ember_core` + the toolchain-independent unit
  # tests. The point is catching C++23 idiom drift early
  # (`std::views::enumerate` has bitten the project as a post-release
  # hotfix more than once). The CLI is intentionally out of scope here:
  # `cli/` uses `<print>` / `std::println` which need libc++ 18, and
  # macos-14's Apple Clang 15 ships with libc++ 16. Bringing the CLI
  # under macOS once libc++ catches up (or once cli/ swaps to fmt) is a
  # separate workstream.
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: brew install cmake ninja

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DEMBER_BUILD_CLI=OFF

      - name: Build core + unit-test executables
        id: build
        run: |
          set -o pipefail
          cmake --build build --verbose \
                                  --target ember_core \
                                          ember_demangle_test \
                                          ember_annotations_resolver_test \
                                          ember_sigs_test 2>&1 | tee build.log

      - name: Surface build errors in job summary
        if: failure() && steps.build.outcome == 'failure'
        run: |
          {
            echo "## macOS build error"
            echo
            echo '```'
            grep -E -A2 "error:|warning:.*-Werror|fatal error:" build.log | head -200
            echo '```'
            echo
            echo "## Last 100 lines of build.log"
            echo
            echo '```'
            tail -100 build.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload build log on failure
        if: failure() && steps.build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: macos-build-log
          path: build.log
          if-no-files-found: ignore

      - name: Run toolchain-independent unit tests
        run: |
          ctest --test-dir build --output-on-failure \
            -R '^(demangle_unit|annotations_resolver_unit|sigs_unit)$'

  # Windows MSVC build-only gate. release.yml already builds Windows on
  # tag pushes, but per-PR we want to catch MSVC-only issues
  # (/permissive- enforcement, header order sensitivity, _CRT_SECURE_*
  # interactions) before they land on main and break a release. Goldens
  # don't run here — addresses + sig hashes are gcc-pinned by design.
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release
