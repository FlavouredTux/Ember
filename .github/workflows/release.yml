name: release

# Build the C++ CLI + Electron app for Linux / Windows and upload the
# artifacts. Two triggers:
#   - tag push (v*) publishes a GitHub Release with the artifacts
#   - manual (workflow_dispatch) uploads workflow artifacts only
#
# macOS is intentionally out of scope for packaged releases until the
# CLI no longer depends on <print>/std::println support that the
# macos-14 Apple clang/libc++ toolchain does not provide.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    container: gcc:16

    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          apt-get update
          apt-get install -y cmake ninja-build python3

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build CLI
        run: cmake --build build --target ember_cli

      # No ctest here; release is gated on successful build only.
      # Golden tests live in ci.yml and have their own drift to chase.

      - uses: actions/setup-node@v4
        with: { node-version: '26' }

      - name: Install UI deps
        working-directory: ui
        run: npm ci

      - name: Package Electron app
        working-directory: ui
        env:
          GH_TOKEN: ""
        run: npm run package:linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ember-linux
          path: |
            ui/release/*.AppImage
            ui/release/*.deb
          if-no-files-found: error

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ui/release/*.AppImage
            ui/release/*.deb
          fail_on_unmatched_files: false
          overwrite_files: true
          body_path: .github/release-notes/${{ github.ref_name }}.md

  build-windows:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Windows toolchain
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build CLI
        run: cmake --build build --target ember_cli

      # No ctest here; release is gated on successful build only.
      # Golden tests live in ci.yml and have their own drift to chase.

      - uses: actions/setup-node@v4
        with: { node-version: '26' }

      - name: Install UI deps
        working-directory: ui
        run: npm ci

      - name: Package Electron app
        working-directory: ui
        env:
          GH_TOKEN: ""
        run: npm run package:win

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ember-win
          path: ui/release/*.exe
          if-no-files-found: error

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ui/release/*.exe
          fail_on_unmatched_files: false
          overwrite_files: true
          body_path: .github/release-notes/${{ github.ref_name }}.md
