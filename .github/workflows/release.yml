name: release

# Build the C++ CLI + Electron app for linux / macos / windows and
# upload the artifacts. Two triggers:
#   - tag push (v*) → publish a GitHub Release with the artifacts
#   - manual (workflow_dispatch) → just upload as workflow artifacts
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # needed for softprops/action-gh-release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: linux
            cli_artifact: build/cli/ember
            package_glob: |
              ui/release/*.AppImage
              ui/release/*.deb
          - os: macos-14
            target: mac
            cli_artifact: build/cli/ember
            package_glob: |
              ui/release/*.dmg
              ui/release/*.zip
          - os: windows-2022
            target: win
            cli_artifact: build/cli/ember.exe
            package_glob: |
              ui/release/*.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Linux toolchain
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gcc-14 g++-14 python3

      - name: macOS toolchain
        if: matrix.target == 'mac'
        run: brew install cmake ninja

      - name: Windows toolchain
        if: matrix.target == 'win'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure (linux)
        if: matrix.target == 'linux'
        env:
          CC:  gcc-14
          CXX: g++-14
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Configure (mac)
        if: matrix.target == 'mac'
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Configure (win)
        if: matrix.target == 'win'
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build CLI
        run: cmake --build build --target ember_cli

      # No ctest here — release is gated on successful build only.
      # Golden tests live in ci.yml and have their own drift to chase.

      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install UI deps
        working-directory: ui
        run: npm ci

      - name: Package Electron app
        working-directory: ui
        # GH_TOKEN env stops electron-builder from trying to publish
        # mid-build; we upload the artifacts ourselves below.
        env:
          GH_TOKEN: ""
        run: npm run package:${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ember-${{ matrix.target }}
          path: ${{ matrix.package_glob }}
          if-no-files-found: error

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.package_glob }}
          fail_on_unmatched_files: false
          generate_release_notes: true
